name: Android Instrumentation Tests

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  instrumentation-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        api-level: [29]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Instrumentation Tests
        uses: reactivecircus/android-emulator-runner@v2
        continue-on-error: true
        with:
          api-level: ${{ matrix.api-level }}
          target: default
          arch: x86_64
          profile: pixel_2
          emulator-boot-timeout: 900
          disable-animations: true
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot -wipe-data -camera-back none
          script: |
            ./gradlew connectedDebugAndroidTest --stacktrace
            echo $? > /tmp/gradle-exit-code

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumentation-test-reports
          path: app/build/reports/androidTests/connected/
          if-no-files-found: ignore

      - name: Print Failed Tests
        if: always()
        run: |
          echo "=== Searching for test failure XML files ==="
          find app/build/outputs/androidTest-results -name "*.xml" 2>/dev/null | while read f; do
            echo "--- $f ---"
            grep -E '<failure|<error' "$f" && echo "" || true
          done
          echo "=== Done ==="

